services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ttllm
      POSTGRES_USER: ttllm
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ttllm"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      TTLLM_DATABASE_URL: postgresql+asyncpg://ttllm:dev@db:5432/ttllm
      AWS_DEFAULT_REGION: us-east-1
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
