name: Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Unit tests
        run: pytest -m "not integration"

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: pip install -e ".[dev]"

      - name: Start stack
        run: docker compose -f docker-compose.integration.yml up -d --build

      - name: Wait for gateway health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/health >/dev/null 2>&1; then
              echo "gateway healthy"; exit 0
            fi
            sleep 2
          done
          echo "gateway did not become healthy"; exit 1

      - name: Run integration tests
        env:
          TTLLM_TEST_BASE_URL: http://localhost:8000
        run: pytest tests/integration -m integration

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.integration.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.integration.yml down -v
