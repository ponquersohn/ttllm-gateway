name: Release

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Only publish releases cut from reviewed code. The release commit must be
      # contained in `main` or a `release/*` branch (both protected, requiring a
      # reviewed PR to land code). This guard runs from the workflow file on the
      # default branch, so a collaborator cannot bypass it by editing the tag.
      - name: Verify release commit is on a protected branch
        run: |
          git fetch --quiet origin '+refs/heads/main:refs/remotes/origin/main' \
            '+refs/heads/release/*:refs/remotes/origin/release/*'
          branches=$(git branch -r --contains "$GITHUB_SHA" \
            'origin/main' 'origin/release/*' 2>/dev/null)
          if [ -z "$branches" ]; then
            echo "::error::Release commit $GITHUB_SHA is not contained in 'main'" \
              "or any 'release/*' branch. Releases must be cut from reviewed code."
            exit 1
          fi
          echo "Release commit found on:"
          echo "$branches"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --no-cache-dir build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  build-and-push-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
