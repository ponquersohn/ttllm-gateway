services:
  dev:
    image: mcr.microsoft.com/devcontainers/base:ubuntu-24.04
    volumes:
      - ..:/workspaces/ttllm:cached
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy
    environment:
      TTLLM_DATABASE_URL: postgresql+asyncpg://ttllm:dev@db:5432/ttllm

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ttllm
      POSTGRES_USER: ttllm
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ttllm"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
